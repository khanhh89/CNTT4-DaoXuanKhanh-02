<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Biểu mẫu Nhân viên</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .form-card {
            background: white;
            padding: 20px;
            border: 1px solid #ccc;
            width: 400px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .form-header {
            border-bottom: 2px solid #333;
            margin-bottom: 15px;
            padding-bottom: 5px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input {
            width: 94%;
            padding: 8px;
            border: 1px solid #777;
        }
        .input-error {
            border: 1px solid red;
            background-color: #fff0f0;
        }

        .error-text {
            color: red;
            font-size: 12px;
            margin-top: 3px;
        }

        .btn-group {
            text-align: right;
            margin-top: 20px;
        }

        button {
            padding: 7px 15px;
            cursor: pointer;
            background-color: #f0f0f0;
            border: 1px solid #777;
            font-weight: bold;
        }

        button:hover {
            background-color: #e0e0e0;
        }

        .btn-cancel {
            text-decoration: none;
            color: black;
            font-size: 14px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="form-card">
    <div class="form-header">
        <h3 th:text="${employee.id == null ? 'Thêm nhân viên mới' : 'Chỉnh sửa nhân viên'}">Biểu mẫu</h3>
    </div>

    <form th:action="@{/employees/save}" th:object="${employee}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label>Họ và Tên</label>
            <input type="text"
                   th:field="*{fullName}"
                   placeholder="Nhập tên nhân viên..."
                   th:class="${#fields.hasErrors('fullName')} ? 'input-error' : ''" />
            <div class="error-text" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
        </div>

        <div class="form-group">
            <label>Chức vụ</label>
            <input type="text"
                   th:field="*{position}"
                   placeholder="Nhập vị trí công việc..."
                   th:class="${#fields.hasErrors('position')} ? 'input-error' : ''" />
            <div class="error-text" th:if="${#fields.hasErrors('position')}" th:errors="*{position}"></div>
        </div>

        <div class="form-group">
            <label>Mức lương ($)</label>
            <input type="number"
                   th:field="*{salary}"
                   placeholder="Nhập lương (tối thiểu 100)..."
                   th:class="${#fields.hasErrors('salary')} ? 'input-error' : ''" />
            <div class="error-text" th:if="${#fields.hasErrors('salary')}" th:errors="*{salary}"></div>
        </div>

        <div class="btn-group">
            <a th:href="@{/employees/}" class="btn-cancel">Hủy bỏ</a>
            <button type="submit">
                <span th:text="${employee.id == null ? 'Tạo mới' : 'Cập nhật'}">Lưu</span>
            </button>
        </div>
    </form>
</div>

</body>
</html>
