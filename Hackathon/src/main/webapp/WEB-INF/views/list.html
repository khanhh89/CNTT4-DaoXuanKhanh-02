<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý nhân viên</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #fff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid #333;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #ececec;
        }
        .search-container {
            margin-bottom: 15px;
        }
        .btn-add {
            display: inline-block;
            margin-bottom: 10px;
            padding: 6px 12px;
            background-color: #f0f0f0;
            color: black;
            text-decoration: none;
            border: 1px solid #999;
            font-size: 14px;
        }
        .btn-add:hover {
            background-color: #e0e0e0;
        }
        input[type="text"] {
            padding: 4px;
            border: 1px solid #ccc;
        }
        button {
            cursor: pointer;
            padding: 4px 10px;
        }
    </style>
</head>
<body>

<h2>Danh sách nhân viên</h2>

<div class="search-container">
    <a th:href="@{/employees/add}" class="btn-add">+ Thêm nhân viên mới</a>

    <form method="get" th:action="@{/employees/}">
        <input type="text" name="keyword" th:value="${param.keyword}" placeholder="Tìm theo tên, vị trí...">
        <button type="submit">Tìm kiếm</button>
    </form>
</div>

<table>
    <thead>
    <tr>
        <th>STT</th>
        <th>Họ và Tên</th>
        <th>Chức vụ</th>
        <th>Mức lương</th>
        <th>Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(employees)}">
        <td colspan="5" style="text-align: center; color: #666;">Không có dữ liệu nhân viên</td>
    </tr>

    <tr th:each="e, iterStat : ${employees}">
        <td th:text="${iterStat.count}"></td>
        <td th:text="${e.fullName}"></td>
        <td th:text="${e.position}"></td>
        <td th:text="${e.salary} + ' $'"></td>
        <td>
            <a th:href="@{/employees/edit/{id}(id=${e.id})}">Sửa</a> |
            <a th:href="@{/employees/delete/{id}(id=${e.id})}"
               onclick="return confirm('Bạn có chắc chắn muốn xóa nhân viên này không?')">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
